name: Sync Upstream and Release

on:
  schedule:
    # 每天北京时间 04:00（UTC 20:00）检查一次上游更新
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
      version: ${{ steps.sync.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream (3899/SimAdmin)
        id: sync
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/3899/SimAdmin.git
          git fetch upstream main

          NEW_COMMITS=$(git rev-list HEAD..upstream/main --count)
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "没有上游更新"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "发现 $NEW_COMMITS 个新提交，合并中..."
          git merge upstream/main --no-edit
          git push origin HEAD:main

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

  build:
    needs: sync
    if: needs.sync.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm exec vite build

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cross

      - name: Build backend (x86_64-unknown-linux-musl)
        run: cd backend && cross build --release --target x86_64-unknown-linux-musl

      - name: Build backend (aarch64-unknown-linux-musl)
        run: cd backend && cross build --release --target aarch64-unknown-linux-musl

      - name: Package release assets
        run: |
          set -euo pipefail
          VERSION="${{ needs.sync.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%dT%H:%M:%S+08:00")

          declare -A ARCH_TAGS=(
            ["x86_64-unknown-linux-musl"]="x86_64"
            ["aarch64-unknown-linux-musl"]="aarch64"
          )

          for TARGET in "${!ARCH_TAGS[@]}"; do
            ARCH_TAG="${ARCH_TAGS[$TARGET]}"
            STAGE=$(mktemp -d)
            cp "backend/target/$TARGET/release/simadmin" "$STAGE/simadmin"
            chmod 755 "$STAGE/simadmin"
            cp -r frontend/dist "$STAGE/www"

            BINARY_MD5=$(md5sum "$STAGE/simadmin" | cut -d' ' -f1)
            FRONTEND_MD5=$(find "$STAGE/www" -type f -exec md5sum {} \; | cut -d' ' -f1 | sort | md5sum | cut -d' ' -f1)

            cat > "$STAGE/meta.json" << EOF
          {
              "version": "$VERSION",
              "commit": "$COMMIT",
              "build_time": "$BUILD_TIME",
              "binary_md5": "$BINARY_MD5",
              "frontend_md5": "$FRONTEND_MD5",
              "arch": "$TARGET"
          }
          EOF

            tar -czf "simadmin-${ARCH_TAG}.tar.gz" -C "$STAGE" meta.json simadmin www
            echo "打包完成: simadmin-${ARCH_TAG}.tar.gz ($TARGET)"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.sync.outputs.version }}
          name: v${{ needs.sync.outputs.version }}
          body: |
            自动同步自上游 [3899/SimAdmin](https://github.com/3899/SimAdmin) 并多架构构建。
            包含 x86_64 与 aarch64 (musl) 两个架构的 OTA 包。
          files: |
            simadmin-x86_64.tar.gz
            simadmin-aarch64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
